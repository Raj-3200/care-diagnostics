version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: care-diagnostics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: care_user
      POSTGRES_PASSWORD: care_pass
      POSTGRES_DB: care_diagnostics
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
